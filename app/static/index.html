<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Locus</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%231a1d27'/%3E%3Ccircle cx='16' cy='16' r='7' fill='none' stroke='%236c8cf5' stroke-width='2'/%3E%3Ccircle cx='16' cy='16' r='3' fill='%23a78bfa'/%3E%3Cline x1='16' y1='4' x2='16' y2='9' stroke='%236c8cf5' stroke-width='2' stroke-linecap='round'/%3E%3Cline x1='16' y1='23' x2='16' y2='28' stroke='%236c8cf5' stroke-width='2' stroke-linecap='round'/%3E%3Cline x1='4' y1='16' x2='9' y2='16' stroke='%236c8cf5' stroke-width='2' stroke-linecap='round'/%3E%3Cline x1='23' y1='16' x2='28' y2='16' stroke='%236c8cf5' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="font-sans bg-bg text-text flex flex-col min-h-screen">

<header class="px-8 py-4 border-b border-border flex items-center gap-4">
  <h1 class="text-[1.4rem] font-bold tracking-[0.05em]">Lo<span class="text-accent">cus</span></h1>
  <span class="text-muted text-[0.8rem]">semantic dataspace manager</span>
  <a class="ml-auto bg-transparent border border-border text-muted px-3 py-1 text-xs font-semibold tracking-[0.04em] no-underline rounded hover:border-accent hover:text-accent transition-colors" href="/docs" target="_blank" rel="noopener noreferrer">API</a>
  <button class="bg-transparent border border-border text-muted px-3 py-1 text-xs font-semibold tracking-[0.04em] rounded cursor-pointer hover:border-accent2 hover:text-accent2 transition-colors" onclick="openLogs()">Logs</button>
  <button id="logoutBtn" class="hidden bg-transparent border border-border text-muted px-3 py-1 text-xs font-semibold tracking-[0.04em] rounded cursor-pointer hover:border-red-400 hover:text-red-400 transition-colors" onclick="doLogout()">Sign out</button>
  <button class="bg-transparent border border-border text-muted px-2.5 py-1 text-base rounded cursor-pointer hover:border-accent hover:text-accent transition-colors" onclick="openSettings()" title="Settings">⚙</button>
</header>

<div class="hidden fixed inset-0 z-[100] bg-black/50 items-start justify-end" id="logsOverlay" onclick="closeLogsOnBackdrop(event)">
  <div class="bg-surface border-l border-border w-[560px] h-full p-6 flex flex-col gap-4 overflow-hidden">
    <div class="flex items-center justify-between">
      <h2 class="text-base font-bold">Request Log</h2>
      <div class="flex gap-2">
        <button class="bg-surface border border-border text-text rounded px-2.5 py-1 text-xs cursor-pointer hover:opacity-85" onclick="clearLogs()">Clear</button>
        <button class="bg-surface border border-border text-text rounded px-2.5 py-1 text-xs cursor-pointer hover:opacity-85" onclick="closeLogs()">Close</button>
      </div>
    </div>
    <div class="flex-1 overflow-y-auto text-xs font-mono">
      <table class="w-full border-collapse">
        <thead>
          <tr>
            <th class="text-left text-muted font-semibold px-2 py-1 border-b border-border sticky top-0 bg-surface">Time</th>
            <th class="text-left text-muted font-semibold px-2 py-1 border-b border-border sticky top-0 bg-surface">Method</th>
            <th class="text-left text-muted font-semibold px-2 py-1 border-b border-border sticky top-0 bg-surface">Path</th>
            <th class="text-left text-muted font-semibold px-2 py-1 border-b border-border sticky top-0 bg-surface">Status</th>
            <th class="text-left text-muted font-semibold px-2 py-1 border-b border-border sticky top-0 bg-surface">ms</th>
          </tr>
        </thead>
        <tbody id="logsBody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="hidden fixed inset-0 z-[100] bg-black/50 items-start justify-end" id="settingsOverlay" onclick="closeSettingsOnBackdrop(event)">
  <div class="bg-surface border-l border-border w-[360px] h-full p-6 flex flex-col gap-5 overflow-y-auto">
    <h2 class="text-base font-bold">Settings</h2>

    <div class="flex flex-col gap-1.5">
      <label class="text-xs text-muted uppercase tracking-[0.08em] flex items-center gap-1.5">Ollama URL <span id="urlSourceBadge"></span></label>
      <input id="settingsOllamaUrl" type="text" placeholder="http://localhost:11434" class="bg-bg border border-border rounded px-3 py-2 text-text text-sm outline-none font-mono focus:border-accent read-only:opacity-50 read-only:cursor-not-allowed" />
    </div>

    <div class="flex flex-col gap-1.5">
      <label class="text-xs text-muted uppercase tracking-[0.08em] flex items-center gap-1.5">Embed model <span id="modelSourceBadge"></span></label>
      <input id="settingsEmbedModel" type="text" placeholder="nomic-embed-text" class="bg-bg border border-border rounded px-3 py-2 text-text text-sm outline-none font-mono focus:border-accent read-only:opacity-50 read-only:cursor-not-allowed" />
    </div>

    <p class="text-xs text-muted leading-relaxed" id="settingsNote"></p>

    <div class="flex gap-2">
      <button class="bg-accent text-white border-none rounded px-3 py-1.5 text-[0.8rem] cursor-pointer font-semibold hover:opacity-85" onclick="saveSettings()">Save</button>
      <button class="bg-surface border border-border text-text rounded px-3 py-1.5 text-[0.8rem] cursor-pointer hover:opacity-85" onclick="closeSettings()">Cancel</button>
    </div>

    <div id="settingsStatus"></div>

    <!-- API Keys (shown only when auth enabled) -->
    <div id="apiKeysSection" class="hidden flex flex-col gap-3 border-t border-border pt-4">
      <h3 class="text-xs text-muted uppercase tracking-[0.08em]">API Keys</h3>
      <div id="apiKeysList" class="flex flex-col gap-1.5"></div>
      <button onclick="showCreateKeyForm()" class="text-xs text-accent hover:underline text-left">+ New key</button>
      <div id="createKeyForm" class="hidden flex flex-col gap-2">
        <input id="newKeyName" type="text" placeholder="Key name"
          class="bg-bg border border-border rounded px-2.5 py-1.5 text-text text-xs outline-none focus:border-accent" />
        <button onclick="createApiKey()" class="bg-accent text-white border-none rounded px-3 py-1.5 text-xs font-semibold cursor-pointer hover:opacity-85">Create</button>
      </div>
      <div id="newKeyDisplay" class="hidden bg-bg border border-border rounded p-3 flex flex-col gap-2">
        <p class="text-xs text-muted">Copy your key — shown only once:</p>
        <code id="newKeyValue" class="text-xs break-all text-accent2"></code>
        <div class="flex gap-2">
          <button onclick="copyApiKey()" class="text-xs text-accent hover:underline">Copy</button>
          <button onclick="dismissApiKey()" class="text-xs text-muted hover:underline">Done</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Login Page -->
<div id="loginPage" class="hidden fixed inset-0 z-[200] bg-bg flex items-center justify-center">
  <div class="bg-surface border border-border rounded-xl shadow-lg p-8 w-full max-w-sm flex flex-col gap-4">
    <h2 class="text-xl font-bold text-center">Lo<span class="text-accent">cus</span></h2>
    <input id="loginUsername" type="text" placeholder="Username" autocomplete="username"
      class="bg-bg border border-border rounded px-3 py-2 text-text text-sm outline-none focus:border-accent"
      onkeydown="if(event.key==='Enter') doLogin()" />
    <input id="loginPassword" type="password" placeholder="Password" autocomplete="current-password"
      class="bg-bg border border-border rounded px-3 py-2 text-text text-sm outline-none focus:border-accent"
      onkeydown="if(event.key==='Enter') doLogin()" />
    <p id="loginError" class="text-red-400 text-xs min-h-[1rem]"></p>
    <button id="signInBtn" onclick="doLogin()" class="bg-accent text-white border-none rounded px-4 py-2 text-sm font-semibold cursor-pointer hover:opacity-85 disabled:opacity-50 disabled:cursor-not-allowed">Sign in</button>
    <button id="registerBtn" onclick="doRegister()" class="bg-surface border border-border text-text rounded px-4 py-2 text-sm cursor-pointer hover:opacity-85">Create account</button>
  </div>
</div>

<div class="grid grid-cols-[220px_1fr] flex-1 min-h-0">
  <aside class="border-r border-border p-4 flex flex-col gap-4 overflow-y-auto">
    <div class="flex flex-col gap-2">
      <h2 class="text-[0.7rem] uppercase tracking-[0.1em] text-muted">Spaces</h2>
      <div class="flex flex-col gap-1" id="spaceList"></div>
      <div class="flex gap-2">
        <input id="newSpaceName" placeholder="new space…" class="flex-1 bg-surface border border-border rounded px-2.5 py-1.5 text-text text-[0.8rem] outline-none focus:border-accent" />
        <button class="bg-accent text-white border-none rounded px-3 py-1.5 text-[0.8rem] cursor-pointer font-semibold hover:opacity-85" onclick="createSpace()">+</button>
      </div>
    </div>
    <div class="flex flex-col gap-2">
      <h2 class="text-[0.7rem] uppercase tracking-[0.1em] text-muted">Collections</h2>
      <div class="flex flex-col gap-1" id="collectionList"></div>
      <div class="flex gap-2">
        <input id="newCollectionName" placeholder="new collection…" class="flex-1 bg-surface border border-border rounded px-2.5 py-1.5 text-text text-[0.8rem] outline-none focus:border-accent" />
        <button class="bg-accent text-white border-none rounded px-3 py-1.5 text-[0.8rem] cursor-pointer font-semibold hover:opacity-85" onclick="createCollection()">+</button>
      </div>
    </div>
  </aside>

  <main id="main" class="p-6 px-8 flex flex-col gap-6 overflow-y-auto">
    <div class="flex flex-col items-center justify-center flex-1 text-muted gap-2 p-16 text-center">
      <div class="text-[2.5rem]">◈</div>
      <div>Select or create a dataspace to get started</div>
    </div>
  </main>
</div>

<script src="/static/app.js"></script>
</body>
</html>
