<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Locus</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --accent: #6c8cf5;
      --accent2: #a78bfa;
      --text: #e2e4ed;
      --muted: #6b7280;
      --success: #34d399;
      --danger: #f87171;
      --radius: 8px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.05em; }
    header h1 span { color: var(--accent); }
    header .tagline { color: var(--muted); font-size: 0.8rem; }

    .layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      flex: 1;
    }

    aside {
      border-right: 1px solid var(--border);
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    aside h2 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 0.25rem; }

    .space-list { display: flex; flex-direction: column; gap: 0.25rem; flex: 1; }

    .space-item {
      padding: 0.4rem 0.75rem;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.875rem;
      border: 1px solid transparent;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .space-item:hover { background: var(--surface); }
    .space-item.active { background: var(--surface); border-color: var(--accent); color: var(--accent); }
    .space-item .del { opacity: 0; font-size: 0.75rem; color: var(--danger); cursor: pointer; }
    .space-item:hover .del { opacity: 1; }

    .new-space { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
    .new-space input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.35rem 0.6rem; color: var(--text); font-size: 0.8rem; outline: none; }
    .new-space input:focus { border-color: var(--accent); }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 0.35rem 0.75rem;
      font-size: 0.8rem;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button.secondary { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-weight: 400; }
    button.danger { background: var(--danger); }

    main { padding: 1.5rem 2rem; display: flex; flex-direction: column; gap: 1.5rem; overflow-y: auto; }

    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; color: var(--muted); gap: 0.5rem; padding: 4rem; text-align: center; }
    .empty-state .icon { font-size: 2.5rem; }

    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; }
    .panel h3 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 0.75rem; }

    .search-row { display: flex; gap: 0.5rem; }
    .search-row input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.5rem 0.75rem; color: var(--text); font-size: 0.875rem; outline: none; }
    .search-row input:focus { border-color: var(--accent); }

    .ingest-area { display: flex; flex-direction: column; gap: 0.5rem; }
    .ingest-area textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.6rem 0.75rem;
      color: var(--text);
      font-size: 0.875rem;
      resize: vertical;
      min-height: 90px;
      font-family: inherit;
      outline: none;
    }
    .ingest-area textarea:focus { border-color: var(--accent); }
    .ingest-row { display: flex; gap: 0.5rem; align-items: center; }
    .ingest-row input[type=text] { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.4rem 0.6rem; color: var(--text); font-size: 0.8rem; outline: none; }
    .ingest-row input:focus { border-color: var(--accent); }

    .results { display: flex; flex-direction: column; gap: 0.75rem; }
    .result-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
    }
    .result-meta { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--muted); margin-bottom: 0.4rem; }
    .result-score { color: var(--accent2); font-weight: 600; }
    .result-text { font-size: 0.875rem; line-height: 1.5; }
    .result-full { margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid var(--border); font-size: 0.8rem; color: var(--muted); white-space: pre-wrap; max-height: 200px; overflow-y: auto; }

    .docs-list { display: flex; flex-direction: column; gap: 0.4rem; }
    .doc-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; padding: 0.3rem 0; border-bottom: 1px solid var(--border); }
    .doc-row:last-child { border-bottom: none; }
    .doc-id { font-family: monospace; color: var(--accent); cursor: pointer; }
    .doc-id:hover { text-decoration: underline; }

    .status { font-size: 0.8rem; padding: 0.4rem 0.75rem; border-radius: var(--radius); }
    .status.ok { background: #0d2e22; color: var(--success); }
    .status.err { background: #2e0d0d; color: var(--danger); }

    .tag { display: inline-block; font-size: 0.7rem; padding: 0.1rem 0.4rem; border-radius: 4px; background: var(--border); color: var(--muted); }

    /* header buttons */
    .settings-btn { margin-left: auto; background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 0.3rem 0.6rem; font-size: 1rem; }
    .settings-btn:hover { border-color: var(--accent); color: var(--accent); opacity: 1; }
    .logs-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 0.3rem 0.7rem; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.04em; }
    .logs-btn:hover { border-color: var(--accent2); color: var(--accent2); opacity: 1; }

    .settings-overlay, .logs-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: flex-start;
      justify-content: flex-end;
    }
    .settings-overlay.open, .logs-overlay.open { display: flex; }

    .logs-panel {
      background: var(--surface);
      border-left: 1px solid var(--border);
      width: 560px;
      height: 100%;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      overflow: hidden;
    }
    .logs-panel-header { display: flex; align-items: center; justify-content: space-between; }
    .logs-panel-header h2 { font-size: 1rem; font-weight: 700; }
    .logs-table { flex: 1; overflow-y: auto; font-size: 0.75rem; font-family: monospace; }
    .logs-table table { width: 100%; border-collapse: collapse; }
    .logs-table th { text-align: left; color: var(--muted); font-weight: 600; padding: 0.3rem 0.5rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); }
    .logs-table td { padding: 0.3rem 0.5rem; border-bottom: 1px solid #1e2030; white-space: nowrap; }
    .logs-table tr:last-child td { border-bottom: none; }
    .log-2xx { color: var(--success); }
    .log-4xx { color: #fbbf24; }
    .log-5xx { color: var(--danger); }
    .log-path { color: var(--text); max-width: 240px; overflow: hidden; text-overflow: ellipsis; }
    .log-method { color: var(--accent); }
    .log-detail { color: var(--danger); font-size: 0.7rem; padding: 0.2rem 0.5rem 0.4rem 0.5rem; white-space: pre-wrap; word-break: break-all; background: #1a0a0a; border-bottom: 1px solid #2e1010; }
    .log-expand { cursor: pointer; color: var(--muted); font-size: 0.7rem; padding: 0 0.3rem; }
    .log-expand:hover { color: var(--danger); }

    .settings-panel {
      background: var(--surface);
      border-left: 1px solid var(--border);
      width: 360px;
      height: 100%;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      overflow-y: auto;
    }
    .settings-panel h2 { font-size: 1rem; font-weight: 700; }
    .settings-field { display: flex; flex-direction: column; gap: 0.4rem; }
    .settings-field label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; display: flex; align-items: center; gap: 0.4rem; }
    .settings-field input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.5rem 0.75rem;
      color: var(--text);
      font-size: 0.875rem;
      outline: none;
      font-family: monospace;
    }
    .settings-field input:focus { border-color: var(--accent); }
    .settings-field input:read-only { opacity: 0.5; cursor: not-allowed; }
    .source-badge { font-size: 0.65rem; padding: 0.1rem 0.35rem; border-radius: 3px; background: var(--border); color: var(--muted); text-transform: none; letter-spacing: 0; }
    .source-badge.env { background: #1a2e1a; color: var(--success); }
    .source-badge.saved { background: #1a1e2e; color: var(--accent); }
    .settings-note { font-size: 0.75rem; color: var(--muted); line-height: 1.5; }
  </style>
</head>
<body>

<header>
  <h1>Lo<span>cus</span></h1>
  <span class="tagline">semantic dataspace manager</span>
  <button class="logs-btn" onclick="openLogs()">Logs</button>
  <button class="settings-btn" onclick="openSettings()" title="Settings">⚙</button>
</header>

<div class="logs-overlay" id="logsOverlay" onclick="closeLogsOnBackdrop(event)">
  <div class="logs-panel">
    <div class="logs-panel-header">
      <h2>Request Log</h2>
      <div style="display:flex;gap:0.5rem;">
        <button class="secondary" style="font-size:0.75rem;padding:0.25rem 0.6rem;" onclick="clearLogs()">Clear</button>
        <button class="secondary" style="font-size:0.75rem;padding:0.25rem 0.6rem;" onclick="closeLogs()">Close</button>
      </div>
    </div>
    <div class="logs-table">
      <table>
        <thead><tr><th>Time</th><th>Method</th><th>Path</th><th>Status</th><th>ms</th></tr></thead>
        <tbody id="logsBody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="settings-overlay" id="settingsOverlay" onclick="closeSettingsOnBackdrop(event)">
  <div class="settings-panel">
    <h2>Settings</h2>

    <div class="settings-field">
      <label>Ollama URL <span class="source-badge" id="urlSourceBadge"></span></label>
      <input id="settingsOllamaUrl" type="text" placeholder="http://localhost:11434" />
    </div>

    <div class="settings-field">
      <label>Embed model <span class="source-badge" id="modelSourceBadge"></span></label>
      <input id="settingsEmbedModel" type="text" placeholder="nomic-embed-text" />
    </div>

    <p class="settings-note" id="settingsNote"></p>

    <div style="display:flex;gap:0.5rem;">
      <button onclick="saveSettings()">Save</button>
      <button class="secondary" onclick="closeSettings()">Cancel</button>
    </div>

    <div id="settingsStatus"></div>
  </div>
</div>

<div class="layout">
  <aside>
    <h2>Spaces</h2>
    <div class="space-list" id="spaceList"></div>
    <div class="new-space">
      <input id="newSpaceName" placeholder="new space…" />
      <button onclick="createSpace()">+</button>
    </div>
  </aside>

  <main id="main">
    <div class="empty-state">
      <div class="icon">◈</div>
      <div>Select or create a dataspace to get started</div>
    </div>
  </main>
</div>

<script>
  let currentSpace = null;

  async function api(method, path, body) {
    const opts = { method, headers: {} };
    if (body instanceof FormData) {
      opts.body = body;
    } else if (body) {
      opts.headers['Content-Type'] = 'application/json';
      opts.body = JSON.stringify(body);
    }
    const r = await fetch(path, opts);
    if (!r.ok) {
      const err = await r.json().catch(() => ({ detail: r.statusText }));
      throw new Error(err.detail || r.statusText);
    }
    return r.json();
  }

  async function loadSpaces() {
    const { spaces } = await api('GET', '/spaces');
    const list = document.getElementById('spaceList');
    list.innerHTML = '';
    for (const s of spaces) {
      const el = document.createElement('div');
      el.className = 'space-item' + (s === currentSpace ? ' active' : '');
      el.innerHTML = `<span>${s}</span><span class="del" onclick="delSpace(event,'${s}')">✕</span>`;
      el.onclick = () => selectSpace(s);
      list.appendChild(el);
    }
  }

  async function createSpace() {
    const input = document.getElementById('newSpaceName');
    const name = input.value.trim();
    if (!name) return;
    try {
      await api('POST', '/spaces', { name });
      input.value = '';
      loadSpaces();
    } catch (e) { alert(e.message); }
  }

  async function delSpace(e, name) {
    e.stopPropagation();
    if (!confirm(`Delete space "${name}" and all its data?`)) return;
    await api('DELETE', `/spaces/${name}`);
    if (currentSpace === name) { currentSpace = null; renderEmpty(); }
    loadSpaces();
  }

  function selectSpace(name) {
    currentSpace = name;
    loadSpaces();
    renderSpace();
  }

  function renderEmpty() {
    document.getElementById('main').innerHTML = `
      <div class="empty-state">
        <div class="icon">◈</div>
        <div>Select or create a dataspace to get started</div>
      </div>`;
  }

  function renderSpace() {
    document.getElementById('main').innerHTML = `
      <div class="panel">
        <h3>Search</h3>
        <div class="search-row">
          <input id="searchQ" placeholder="Ask anything…" onkeydown="if(event.key==='Enter') doSearch()" />
          <input type="number" id="searchK" value="5" min="1" max="50" style="width:60px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:0.5rem;color:var(--text);outline:none;" title="top-k" />
          <label style="font-size:0.8rem;display:flex;align-items:center;gap:4px;color:var(--muted);">
            <input type="checkbox" id="searchFull" /> full
          </label>
          <button onclick="doSearch()">Search</button>
        </div>
        <div id="searchResults" style="margin-top:1rem;"></div>
      </div>

      <div class="panel">
        <h3>Ingest</h3>
        <div class="ingest-area">
          <textarea id="ingestText" placeholder="Paste text to ingest…"></textarea>
          <div class="ingest-row">
            <input type="text" id="ingestSource" placeholder="source label (optional)" />
            <button onclick="doIngest()">Ingest</button>
          </div>
          <div style="color:var(--muted);font-size:0.75rem;">or upload a file:</div>
          <div class="ingest-row">
            <input type="file" id="ingestFile" accept=".txt,.md,.csv,.json" style="flex:1;font-size:0.8rem;color:var(--muted);" />
            <button onclick="doUpload()">Upload</button>
          </div>
          <div id="ingestStatus"></div>
        </div>
      </div>

      <div class="panel">
        <h3>Documents</h3>
        <div id="docsList"><span style="color:var(--muted);font-size:0.8rem;">Loading…</span></div>
        <button class="secondary" style="margin-top:0.75rem;font-size:0.75rem;" onclick="loadDocs()">Refresh</button>
      </div>`;

    loadDocs();
  }

  async function doSearch() {
    const q = document.getElementById('searchQ').value.trim();
    if (!q) return;
    const k = document.getElementById('searchK').value;
    const full = document.getElementById('searchFull').checked;
    const el = document.getElementById('searchResults');
    el.innerHTML = '<span style="color:var(--muted);font-size:0.8rem;">Searching…</span>';
    try {
      const data = await api('GET', `/spaces/${currentSpace}/search?q=${encodeURIComponent(q)}&k=${k}&full=${full}`);
      if (!data.results.length) { el.innerHTML = '<span style="color:var(--muted);font-size:0.8rem;">No results.</span>'; return; }
      el.innerHTML = data.results.map(r => `
        <div class="result-card">
          <div class="result-meta">
            <span class="tag">${r.metadata?.filename || r.metadata?.source || 'doc'}</span>
            <span class="result-score">score ${r.score}</span>
          </div>
          <div class="result-text">${esc(r.text)}</div>
          ${r.full_text ? `<div class="result-full">${esc(r.full_text)}</div>` : ''}
        </div>`).join('');
    } catch (e) {
      el.innerHTML = `<span style="color:var(--danger);font-size:0.8rem;">${e.message}</span>`;
    }
  }

  async function doIngest() {
    const text = document.getElementById('ingestText').value.trim();
    const source = document.getElementById('ingestSource').value.trim();
    if (!text) return;
    const fd = new FormData();
    fd.append('text', text);
    if (source) fd.append('source', source);
    await submitIngest(fd);
    document.getElementById('ingestText').value = '';
  }

  async function doUpload() {
    const file = document.getElementById('ingestFile').files[0];
    if (!file) return;
    const fd = new FormData();
    fd.append('file', file);
    await submitIngest(fd);
    document.getElementById('ingestFile').value = '';
  }

  async function submitIngest(fd) {
    const status = document.getElementById('ingestStatus');
    status.innerHTML = '<span style="color:var(--muted);font-size:0.8rem;">Ingesting…</span>';
    try {
      const r = await api('POST', `/spaces/${currentSpace}/documents`, fd);
      status.innerHTML = `<span class="status ok">Ingested — ${r.chunk_count} chunks · id: ${r.doc_id}</span>`;
      loadDocs();
    } catch (e) {
      status.innerHTML = `<span class="status err">${e.message}</span>`;
    }
  }

  async function loadDocs() {
    const el = document.getElementById('docsList');
    if (!el) return;
    try {
      const { documents } = await api('GET', `/spaces/${currentSpace}/documents`);
      if (!documents.length) { el.innerHTML = '<span style="color:var(--muted);font-size:0.8rem;">No documents yet.</span>'; return; }
      el.innerHTML = `<div class="docs-list">${documents.map(d => `
        <div class="doc-row">
          <span class="doc-id" onclick="fetchDoc('${d.doc_id}')">${d.doc_id.slice(0,12)}…</span>
          <span style="color:var(--muted);font-size:0.75rem;">${d.filename || d.source || ''}</span>
          <button class="danger" style="padding:0.2rem 0.5rem;font-size:0.7rem;" onclick="delDoc('${d.doc_id}')">delete</button>
        </div>`).join('')}</div>`;
    } catch (e) {
      el.innerHTML = `<span style="color:var(--danger);font-size:0.8rem;">${e.message}</span>`;
    }
  }

  async function fetchDoc(id) {
    const doc = await api('GET', `/spaces/${currentSpace}/documents/${id}`);
    alert(`[${id}]\n\n${doc.text.slice(0, 1000)}${doc.text.length > 1000 ? '…' : ''}`);
  }

  async function delDoc(id) {
    if (!confirm(`Delete document ${id}?`)) return;
    await api('DELETE', `/spaces/${currentSpace}/documents/${id}`);
    loadDocs();
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Settings ──────────────────────────────────────────────────────────────

  async function openSettings() {
    const s = await api('GET', '/settings');
    const urlField = document.getElementById('settingsOllamaUrl');
    const modelField = document.getElementById('settingsEmbedModel');

    urlField.value = s.ollama_url.value;
    urlField.readOnly = s.ollama_url.readonly;
    modelField.value = s.embed_model.value;
    modelField.readOnly = s.embed_model.readonly;

    document.getElementById('urlSourceBadge').textContent = s.ollama_url.source;
    document.getElementById('urlSourceBadge').className = `source-badge ${s.ollama_url.source}`;
    document.getElementById('modelSourceBadge').textContent = s.embed_model.source;
    document.getElementById('modelSourceBadge').className = `source-badge ${s.embed_model.source}`;

    const allReadonly = s.ollama_url.readonly && s.embed_model.readonly;
    document.getElementById('settingsNote').textContent = allReadonly
      ? 'All settings are locked by environment variables and cannot be changed here.'
      : s.ollama_url.readonly || s.embed_model.readonly
        ? 'Fields marked "env" are set by environment variables and cannot be changed here.'
        : 'These values are saved to disk and used when environment variables are not set.';

    document.getElementById('settingsStatus').innerHTML = '';
    document.getElementById('settingsOverlay').classList.add('open');
  }

  function closeSettings() {
    document.getElementById('settingsOverlay').classList.remove('open');
  }

  function closeSettingsOnBackdrop(e) {
    if (e.target === document.getElementById('settingsOverlay')) closeSettings();
  }

  async function saveSettings() {
    const body = {
      ollama_url: document.getElementById('settingsOllamaUrl').value.trim() || null,
      embed_model: document.getElementById('settingsEmbedModel').value.trim() || null,
    };
    const statusEl = document.getElementById('settingsStatus');
    try {
      await api('POST', '/settings', body);
      statusEl.innerHTML = '<span class="status ok">Saved.</span>';
    } catch (e) {
      statusEl.innerHTML = `<span class="status err">${e.message}</span>`;
    }
  }

  // ── Logs ──────────────────────────────────────────────────────────────────

  let logsInterval = null;
  const logsExpanded = new Set();

  async function openLogs() {
    document.getElementById('logsOverlay').classList.add('open');
    await refreshLogs();
    logsInterval = setInterval(refreshLogs, 2000);
  }

  function closeLogs() {
    document.getElementById('logsOverlay').classList.remove('open');
    clearInterval(logsInterval);
    logsInterval = null;
  }

  function closeLogsOnBackdrop(e) {
    if (e.target === document.getElementById('logsOverlay')) closeLogs();
  }

  async function refreshLogs() {
    try {
      const { logs } = await api('GET', '/logs');
      const tbody = document.getElementById('logsBody');
      if (!tbody) return;
      if (!logs.length) {
        tbody.innerHTML = '<tr><td colspan="5" style="color:var(--muted);padding:0.5rem;">No requests yet.</td></tr>';
        return;
      }
      tbody.innerHTML = logs.map(l => {
        const cls = l.status >= 500 ? 'log-5xx' : l.status >= 400 ? 'log-4xx' : 'log-2xx';
        const hasDetail = !!l.detail;
        const open = logsExpanded.has(l.seq);
        const detailRow = hasDetail
          ? `<tr id="logd-${l.seq}" style="display:${open ? 'table-row' : 'none'}"><td colspan="5" class="log-detail">${esc(String(l.detail))}</td></tr>`
          : '';
        const expandBtn = hasDetail
          ? `<span class="log-expand">${open ? '▼' : '▶'}</span>`
          : '';
        return `<tr style="cursor:${hasDetail ? 'pointer' : 'default'}" onclick="${hasDetail ? `toggleLogDetail(${l.seq})` : ''}">
          <td style="color:var(--muted)">${l.ts}</td>
          <td class="log-method">${l.method}</td>
          <td class="log-path" title="${esc(l.path)}">${esc(l.path)}</td>
          <td class="${cls}">${l.status}${expandBtn}</td>
          <td style="color:var(--muted)">${l.ms}ms</td>
        </tr>${detailRow}`;
      }).join('');
    } catch (_) {}
  }

  function toggleLogDetail(seq) {
    if (logsExpanded.has(seq)) {
      logsExpanded.delete(seq);
    } else {
      logsExpanded.add(seq);
    }
    const row = document.getElementById(`logd-${seq}`);
    if (row) row.style.display = logsExpanded.has(seq) ? 'table-row' : 'none';
    // update arrow without full refresh
    const rows = document.querySelectorAll(`#logsBody tr`);
    rows.forEach(r => {
      if (r.onclick && r.onclick.toString().includes(`(${seq})`)) {
        const span = r.querySelector('.log-expand');
        if (span) span.textContent = logsExpanded.has(seq) ? '▼' : '▶';
      }
    });
  }

  async function clearLogs() {
    const opts = { method: 'DELETE' };
    await fetch('/logs', opts);
    await refreshLogs();
  }

  // ── Init ──────────────────────────────────────────────────────────────────

  document.getElementById('newSpaceName').addEventListener('keydown', e => {
    if (e.key === 'Enter') createSpace();
  });

  loadSpaces();
</script>
</body>
</html>
