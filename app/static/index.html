<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Locus</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --accent: #6c8cf5;
      --accent2: #a78bfa;
      --text: #e2e4ed;
      --muted: #6b7280;
      --success: #34d399;
      --danger: #f87171;
      --radius: 8px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.05em; }
    header h1 span { color: var(--accent); }
    header .tagline { color: var(--muted); font-size: 0.8rem; }

    .layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      flex: 1;
    }

    aside {
      border-right: 1px solid var(--border);
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    aside h2 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 0.25rem; }

    .space-list { display: flex; flex-direction: column; gap: 0.25rem; flex: 1; }

    .space-item {
      padding: 0.4rem 0.75rem;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.875rem;
      border: 1px solid transparent;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .space-item:hover { background: var(--surface); }
    .space-item.active { background: var(--surface); border-color: var(--accent); color: var(--accent); }
    .space-item .del { opacity: 0; font-size: 0.75rem; color: var(--danger); cursor: pointer; }
    .space-item:hover .del { opacity: 1; }

    .new-space { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
    .new-space input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.35rem 0.6rem; color: var(--text); font-size: 0.8rem; outline: none; }
    .new-space input:focus { border-color: var(--accent); }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 0.35rem 0.75rem;
      font-size: 0.8rem;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button.secondary { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-weight: 400; }
    button.danger { background: var(--danger); }

    main { padding: 1.5rem 2rem; display: flex; flex-direction: column; gap: 1.5rem; overflow-y: auto; }

    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; color: var(--muted); gap: 0.5rem; padding: 4rem; text-align: center; }
    .empty-state .icon { font-size: 2.5rem; }

    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; }
    .panel h3 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 0.75rem; }

    .search-row { display: flex; gap: 0.5rem; }
    .search-row input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.5rem 0.75rem; color: var(--text); font-size: 0.875rem; outline: none; }
    .search-row input:focus { border-color: var(--accent); }

    .ingest-area { display: flex; flex-direction: column; gap: 0.5rem; }
    .ingest-area textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.6rem 0.75rem;
      color: var(--text);
      font-size: 0.875rem;
      resize: vertical;
      min-height: 90px;
      font-family: inherit;
      outline: none;
    }
    .ingest-area textarea:focus { border-color: var(--accent); }
    .ingest-row { display: flex; gap: 0.5rem; align-items: center; }
    .ingest-row input[type=text] { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.4rem 0.6rem; color: var(--text); font-size: 0.8rem; outline: none; }
    .ingest-row input:focus { border-color: var(--accent); }

    .results { display: flex; flex-direction: column; gap: 0.75rem; }
    .result-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
    }
    .result-meta { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--muted); margin-bottom: 0.4rem; }
    .result-score { color: var(--accent2); font-weight: 600; }
    .result-text { font-size: 0.875rem; line-height: 1.5; }
    .result-full { margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid var(--border); font-size: 0.8rem; color: var(--muted); white-space: pre-wrap; max-height: 200px; overflow-y: auto; }

    .docs-list { display: flex; flex-direction: column; gap: 0.4rem; }
    .doc-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; padding: 0.3rem 0; border-bottom: 1px solid var(--border); }
    .doc-row:last-child { border-bottom: none; }
    .doc-id { font-family: monospace; color: var(--accent); cursor: pointer; }
    .doc-id:hover { text-decoration: underline; }

    .status { font-size: 0.8rem; padding: 0.4rem 0.75rem; border-radius: var(--radius); }
    .status.ok { background: #0d2e22; color: var(--success); }
    .status.err { background: #2e0d0d; color: var(--danger); }

    .tag { display: inline-block; font-size: 0.7rem; padding: 0.1rem 0.4rem; border-radius: 4px; background: var(--border); color: var(--muted); }
  </style>
</head>
<body>

<header>
  <h1>Lo<span>cus</span></h1>
  <span class="tagline">semantic dataspace manager</span>
</header>

<div class="layout">
  <aside>
    <h2>Spaces</h2>
    <div class="space-list" id="spaceList"></div>
    <div class="new-space">
      <input id="newSpaceName" placeholder="new space…" />
      <button onclick="createSpace()">+</button>
    </div>
  </aside>

  <main id="main">
    <div class="empty-state">
      <div class="icon">◈</div>
      <div>Select or create a dataspace to get started</div>
    </div>
  </main>
</div>

<script>
  let currentSpace = null;

  async function api(method, path, body) {
    const opts = { method, headers: {} };
    if (body instanceof FormData) {
      opts.body = body;
    } else if (body) {
      opts.headers['Content-Type'] = 'application/json';
      opts.body = JSON.stringify(body);
    }
    const r = await fetch(path, opts);
    if (!r.ok) {
      const err = await r.json().catch(() => ({ detail: r.statusText }));
      throw new Error(err.detail || r.statusText);
    }
    return r.json();
  }

  async function loadSpaces() {
    const { spaces } = await api('GET', '/spaces');
    const list = document.getElementById('spaceList');
    list.innerHTML = '';
    for (const s of spaces) {
      const el = document.createElement('div');
      el.className = 'space-item' + (s === currentSpace ? ' active' : '');
      el.innerHTML = `<span>${s}</span><span class="del" onclick="delSpace(event,'${s}')">✕</span>`;
      el.onclick = () => selectSpace(s);
      list.appendChild(el);
    }
  }

  async function createSpace() {
    const input = document.getElementById('newSpaceName');
    const name = input.value.trim();
    if (!name) return;
    try {
      await api('POST', '/spaces', { name });
      input.value = '';
      loadSpaces();
    } catch (e) { alert(e.message); }
  }

  async function delSpace(e, name) {
    e.stopPropagation();
    if (!confirm(`Delete space "${name}" and all its data?`)) return;
    await api('DELETE', `/spaces/${name}`);
    if (currentSpace === name) { currentSpace = null; renderEmpty(); }
    loadSpaces();
  }

  function selectSpace(name) {
    currentSpace = name;
    loadSpaces();
    renderSpace();
  }

  function renderEmpty() {
    document.getElementById('main').innerHTML = `
      <div class="empty-state">
        <div class="icon">◈</div>
        <div>Select or create a dataspace to get started</div>
      </div>`;
  }

  function renderSpace() {
    document.getElementById('main').innerHTML = `
      <div class="panel">
        <h3>Search</h3>
        <div class="search-row">
          <input id="searchQ" placeholder="Ask anything…" onkeydown="if(event.key==='Enter') doSearch()" />
          <input type="number" id="searchK" value="5" min="1" max="50" style="width:60px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:0.5rem;color:var(--text);outline:none;" title="top-k" />
          <label style="font-size:0.8rem;display:flex;align-items:center;gap:4px;color:var(--muted);">
            <input type="checkbox" id="searchFull" /> full
          </label>
          <button onclick="doSearch()">Search</button>
        </div>
        <div id="searchResults" style="margin-top:1rem;"></div>
      </div>

      <div class="panel">
        <h3>Ingest</h3>
        <div class="ingest-area">
          <textarea id="ingestText" placeholder="Paste text to ingest…"></textarea>
          <div class="ingest-row">
            <input type="text" id="ingestSource" placeholder="source label (optional)" />
            <button onclick="doIngest()">Ingest</button>
          </div>
          <div style="color:var(--muted);font-size:0.75rem;">or upload a file:</div>
          <div class="ingest-row">
            <input type="file" id="ingestFile" accept=".txt,.md,.csv,.json" style="flex:1;font-size:0.8rem;color:var(--muted);" />
            <button onclick="doUpload()">Upload</button>
          </div>
          <div id="ingestStatus"></div>
        </div>
      </div>

      <div class="panel">
        <h3>Documents</h3>
        <div id="docsList"><span style="color:var(--muted);font-size:0.8rem;">Loading…</span></div>
        <button class="secondary" style="margin-top:0.75rem;font-size:0.75rem;" onclick="loadDocs()">Refresh</button>
      </div>`;

    loadDocs();
  }

  async function doSearch() {
    const q = document.getElementById('searchQ').value.trim();
    if (!q) return;
    const k = document.getElementById('searchK').value;
    const full = document.getElementById('searchFull').checked;
    const el = document.getElementById('searchResults');
    el.innerHTML = '<span style="color:var(--muted);font-size:0.8rem;">Searching…</span>';
    try {
      const data = await api('GET', `/spaces/${currentSpace}/search?q=${encodeURIComponent(q)}&k=${k}&full=${full}`);
      if (!data.results.length) { el.innerHTML = '<span style="color:var(--muted);font-size:0.8rem;">No results.</span>'; return; }
      el.innerHTML = data.results.map(r => `
        <div class="result-card">
          <div class="result-meta">
            <span class="tag">${r.metadata?.filename || r.metadata?.source || 'doc'}</span>
            <span class="result-score">score ${r.score}</span>
          </div>
          <div class="result-text">${esc(r.text)}</div>
          ${r.full_text ? `<div class="result-full">${esc(r.full_text)}</div>` : ''}
        </div>`).join('');
    } catch (e) {
      el.innerHTML = `<span style="color:var(--danger);font-size:0.8rem;">${e.message}</span>`;
    }
  }

  async function doIngest() {
    const text = document.getElementById('ingestText').value.trim();
    const source = document.getElementById('ingestSource').value.trim();
    if (!text) return;
    const fd = new FormData();
    fd.append('text', text);
    if (source) fd.append('source', source);
    await submitIngest(fd);
    document.getElementById('ingestText').value = '';
  }

  async function doUpload() {
    const file = document.getElementById('ingestFile').files[0];
    if (!file) return;
    const fd = new FormData();
    fd.append('file', file);
    await submitIngest(fd);
    document.getElementById('ingestFile').value = '';
  }

  async function submitIngest(fd) {
    const status = document.getElementById('ingestStatus');
    status.innerHTML = '<span style="color:var(--muted);font-size:0.8rem;">Ingesting…</span>';
    try {
      const r = await api('POST', `/spaces/${currentSpace}/documents`, fd);
      status.innerHTML = `<span class="status ok">Ingested — ${r.chunk_count} chunks · id: ${r.doc_id}</span>`;
      loadDocs();
    } catch (e) {
      status.innerHTML = `<span class="status err">${e.message}</span>`;
    }
  }

  async function loadDocs() {
    const el = document.getElementById('docsList');
    if (!el) return;
    try {
      const { documents } = await api('GET', `/spaces/${currentSpace}/documents`);
      if (!documents.length) { el.innerHTML = '<span style="color:var(--muted);font-size:0.8rem;">No documents yet.</span>'; return; }
      el.innerHTML = `<div class="docs-list">${documents.map(d => `
        <div class="doc-row">
          <span class="doc-id" onclick="fetchDoc('${d.doc_id}')">${d.doc_id.slice(0,12)}…</span>
          <span style="color:var(--muted);font-size:0.75rem;">${d.filename || d.source || ''}</span>
          <button class="danger" style="padding:0.2rem 0.5rem;font-size:0.7rem;" onclick="delDoc('${d.doc_id}')">delete</button>
        </div>`).join('')}</div>`;
    } catch (e) {
      el.innerHTML = `<span style="color:var(--danger);font-size:0.8rem;">${e.message}</span>`;
    }
  }

  async function fetchDoc(id) {
    const doc = await api('GET', `/spaces/${currentSpace}/documents/${id}`);
    alert(`[${id}]\n\n${doc.text.slice(0, 1000)}${doc.text.length > 1000 ? '…' : ''}`);
  }

  async function delDoc(id) {
    if (!confirm(`Delete document ${id}?`)) return;
    await api('DELETE', `/spaces/${currentSpace}/documents/${id}`);
    loadDocs();
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  document.getElementById('newSpaceName').addEventListener('keydown', e => {
    if (e.key === 'Enter') createSpace();
  });

  loadSpaces();
</script>
</body>
</html>
