services:
  locus:
    build: .
    container_name: locus
    ports:
      - "${LOCUS_PORT:-8000}:8000"
    volumes:
      - locus_data:/data
    environment:
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - EMBED_MODEL=${EMBED_MODEL:-nomic-embed-text}
      - DATA_DIR=/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  locus_data:
